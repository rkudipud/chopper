name: Bug Report
description: Report incorrect behavior, a crash, or unexpected output from Chopper.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Fill in every required field with concrete information from the failing run.

        Do not leave the evidence sections blank. If an artifact is unavailable, say why in that field so the report still contains a complete record.

        If you are using the Chopper Domain Companion in VS Code, ask it to `report-chopper-bug` and it can prepare this issue body automatically. Raw local zip attachments, when needed, still use the GitHub attachment UI.

        **Before submitting:** check that no existing open issue covers the same problem.

  - type: dropdown
    id: command
    attributes:
      label: Which command triggered the bug?
      options:
        - "chopper validate"
        - "chopper trim"
        - "chopper trim --dry-run"
        - "chopper cleanup"
        - "Setup / installation"
        - "Other / not sure"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - "Windows (PowerShell)"
        - "Windows (cmd.exe)"
        - "Linux"
        - "macOS"
        - "Other"
    validations:
      required: true

  - type: input
    id: ec_site
    attributes:
      label: EC site / zone
      description: |
        Which Enterprise Compute site or zone was this issue seen on? This tells
        us which compute cluster to pull logs from. Use "local" if you reproduced
        the bug outside the grid (laptop, desktop, sandbox VM).
      placeholder: "e.g. sc-rh8-prod, fm-grid-02, blr, local"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Run `python --version` and paste the output here.
      placeholder: "e.g. Python 3.11.9"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug directly in this field. Do not answer with only a path to another markdown file.
      placeholder: |
        Command: `chopper trim --project project.json`
        Expected: domain trimmed, audit bundle written to .chopper/
        Actual: PE-02 raised during P2_PARSE and trim stopped before output generation
        Why this looks wrong: the failing file is Python, not Tcl
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Write the reproduction directly here so a maintainer does not need a separate report file.
      placeholder: |
        1. Create a domain with ...
        2. Author a project.json with ...
        3. Run `chopper trim --project project.json`
        4. See error
    validations:
      required: true

  - type: textarea
    id: terminal_output
    attributes:
      label: Terminal output or log excerpt
      description: |
        Paste the failing stdout/stderr here, or paste the most relevant excerpt and say where the full log is attached.
        Do not leave this blank.

        Tip — redirect both streams: `chopper trim --project project.json 2>&1 | tee chopper.log`
      placeholder: |
        [P0_STATE] started
        [P0_STATE] done
        [P2_PARSE] started
        ERROR PE-02: [generate_summary_html.py:986] Unbalanced braces: negative depth
        Summary: 1 error(s), 0 warning(s), 0 info(s); exit 1
      render: text
    validations:
      required: true

  - type: textarea
    id: audit_bundle
    attributes:
      label: Audit artifacts attached or why unavailable
      description: |
        Tell us what you attached from `.chopper/`, or explain why no audit bundle was produced.
        Include the most useful files when available:
        - `diagnostics.json`
        - `chopper_run.json`
        - `trim_report.json` or `trim_report.txt`

        If you are filing from VS Code on a Unix host, you can package local evidence first:
        `python scripts/package_bug_report.py /abs/path/to/.chopper /abs/path/to/report.md`

        If uploads are blocked, paste file paths, key excerpts, or a short explanation instead of leaving this empty.
      placeholder: |
        Attached: .chopper.zip containing diagnostics.json, chopper_run.json, and trim_report.json

        or

        No audit bundle: run failed before P7 after PE-02 in P2_PARSE
      render: text
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: |
        Drag and drop screenshots or recordings here. GitHub supports PNG, JPG, GIF, and MP4.
        If the bug involves garbled terminal output or a rendering issue, a screenshot is often more informative than pasted text.
    validations:
      required: false

  - type: textarea
    id: json_files
    attributes:
      label: Minimal JSON reproduction or why you cannot share it
      description: |
        Paste the smallest failing JSON snippets here. Remove sensitive paths or identifiers.
        If you cannot share the files verbatim, explain which JSON file and keys matter and what was redacted.
      placeholder: |
        base.json:
        {
          "domain": "sta_pt",
          "files": {
            "include": ["scripts/run_sta.tcl"]
          }
        }

        If redacted, explain:
        - which file(s) matter
        - which key(s) trigger the bug
        - what you removed
      render: text
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Anything else?
      description: Workarounds you have tried, related issues, or any other context that might help.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing open issues and this is not a duplicate.
          required: true
        - label: I pasted terminal output or a real log excerpt, not an empty code block.
          required: true
        - label: I attached audit artifacts or explained why no audit bundle was produced.
          required: true
        - label: I pasted a minimal JSON reproduction or explained why I cannot share it verbatim.
          required: true
